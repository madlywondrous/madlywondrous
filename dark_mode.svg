<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="ConsolasFallback,Consolas,monospace" width="985px" height="105px" font-size="16px">
<style>
@font-face {
src: local('Consolas'), local('Consolas Bold');
font-family: 'ConsolasFallback';
font-display: swap;
-webkit-size-adjust: 109%;
size-adjust: 109%;
}
.key {fill: #ffa657;}
.value {fill: #a5d6ff;}
.addColor {fill: #3fb950;}
.delColor {fill: #f85149;}
.cc {fill: #616e7f;}
text, tspan {white-space: pre;}
</style>
<rect width="985px" height="105px" fill="#161b22" rx="15"/>
<text x="15" y="30" fill="#c9d1d9">
<tspan x="15" y="30">- GitHub Stats</tspan> -————————————————————————————————————————————————————————————————————————————————-—-
<tspan x="15" y="50" class="cc">. </tspan><tspan class="key">Repos</tspan>:<tspan class="cc"> ............................................. </tspan><tspan class="cc" id="repo_data_dots"></tspan><tspan class="value" id="repo_data">6</tspan> {<tspan class="key">Contributed</tspan>: <tspan class="value" id="contrib_data">6</tspan>} | <tspan class="key">Stars</tspan>:<tspan class="cc" id="star_data_dots"></tspan><tspan class="value" id="star_data">0</tspan>
<tspan x="15" y="70" class="cc">. </tspan><tspan class="key">Commmits</tspan>:<tspan class="cc"> .......................................................... </tspan><tspan class="cc" id="commit_data_dots"></tspan><tspan class="value" id="commit_data">91</tspan> | <tspan class="key">Followers</tspan>:<tspan class="cc" id="follower_data_dots"></tspan><tspan class="value" id="follower_data">13</tspan>
<tspan x="15" y="90" class="key">Lines of Code</tspan>:<tspan class="cc"> ................................................... </tspan><tspan class="cc" id="loc_data_dots"></tspan><tspan class="value" id="loc_data">69,695</tspan> | ( <tspan class="addColor" id="loc_add">100,242</tspan><tspan class="addColor">++</tspan> , <tspan class="delColor" id="loc_del">30,547</tspan><tspan class="delColor">--</tspan> )
</text>
</svg>